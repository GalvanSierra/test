apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: order-api-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-api-deployment
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50
---
apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: price-api-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: price-api-deployment
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 60
